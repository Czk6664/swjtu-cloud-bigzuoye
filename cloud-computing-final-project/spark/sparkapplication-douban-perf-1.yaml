apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-douban-perf-1
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-south-1.myhuaweicloud.com/czk-course/pyspark-analysis:douban-v4
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - swr-secret
  mainApplicationFile: local:///opt/spark/work/analysis.py
  arguments:
    - file:///opt/spark/work/data/douban_movies.csv
  sparkVersion: "3.4.3"
  sparkConf:
    spark.kubernetes.driver.request.cores: "10m"
    spark.kubernetes.executor.request.cores: "10m"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreRequest: "10m"
    memory: "512m"
    serviceAccount: spark-op-spark-operator-spark
  executor:
    cores: 1
    coreRequest: "10m"
    instances: 1
    memory: "1g"
