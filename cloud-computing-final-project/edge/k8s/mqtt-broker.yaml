apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt-broker-config
  namespace: default
data:
  mosquitto.conf: |
    listener 1883 0.0.0.0
    allow_anonymous true
    persistence false
    log_dest stdout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-broker
  namespace: default
  labels:
    app: mqtt-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-broker
  template:
    metadata:
      labels:
        app: mqtt-broker
    spec:
      imagePullSecrets:
        - name: swr-secret
      containers:
        - name: mosquitto
          image: swr.cn-south-1.myhuaweicloud.com/czk-course/eclipse-mosquitto:2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1883
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
      volumes:
        - name: config
          configMap:
            name: mqtt-broker-config
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-broker
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: mqtt-broker
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
